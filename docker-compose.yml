services:
  back:
    build:
      context: ./apps/back
      dockerfile: Dockerfile
    image: qr-shield-back:local
    container_name: qr-shield-back
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
